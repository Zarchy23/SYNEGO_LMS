{% extends "lms/base.html" %}

{% block title %}Edit Department - Synego Institute{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0"><i class="fas fa-edit me-2"></i>Edit Department</h1>
        <a href="{% url 'lms:admin_departments' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Departments
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-8">
                    <label class="form-label">Department Name</label>
                    <input type="text" name="name" class="form-control" value="{{ department.name }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Department Code</label>
                    <input type="text" name="code" class="form-control" maxlength="20" value="{{ department.code }}" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" required>{{ department.description }}</textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Mission</label>
                    <textarea name="mission" class="form-control" rows="3">{{ department.mission }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vision</label>
                    <textarea name="vision" class="form-control" rows="3">{{ department.vision }}</textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Infrastructure</label>
                    <textarea name="infrastructure" class="form-control" rows="3" required>{{ department.infrastructure }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Resources</label>
                    <textarea name="resources" class="form-control" rows="3" required>{{ department.resources }}</textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Email</label>
                    <input type="email" name="contact_email" class="form-control" value="{{ department.contact_email }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Contact Phone</label>
                    <input type="text" name="contact_phone" class="form-control" value="{{ department.contact_phone }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Office Location</label>
                    <input type="text" name="office_location" class="form-control" value="{{ department.office_location }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Minimum Instructors</label>
                    <input type="number" name="min_instructors" class="form-control" min="1" value="{{ department.min_instructors }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Maximum Capacity</label>
                    <input type="number" name="max_capacity" class="form-control" min="1" value="{{ department.max_capacity }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option value="active" {% if department.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if department.status == 'inactive' %}selected{% endif %}>Inactive</option>
                        <option value="pending" {% if department.status == 'pending' %}selected{% endif %}>Pending Approval</option>
                    </select>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2">
                    <a href="{% url 'lms:admin_departments' %}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

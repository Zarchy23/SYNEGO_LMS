<!-- Modules Management Content -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 mb-0"><i class="fas fa-building me-2"></i>Modules Management</h1>
    <a href="{% url 'lms:admin_add_module' %}" class="btn btn-primary btn-sm">
        <i class="fas fa-plus me-2"></i>Add Module
    </a>
</div>

<!-- Modules Grid -->
<div class="row">
    {% for module in modules %}
    <div class="col-md-6 mb-3">
        <div class="card" style="background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <h5 class="card-title mb-1">{{ module.name }}</h5>
                        <code class="text-muted">{{ module.code }}</code>
                    </div>
                    <span class="badge {% if module.status == 'active' %}bg-success{% else %}bg-secondary{% endif %}">
                        {{ module.get_status_display }}
                    </span>
                </div>
                
                <p class="card-text text-muted small mb-3">{{ module.description|truncatewords:20 }}</p>
                
                <div class="d-flex gap-2">
                    <a href="{% url 'lms:admin_edit_module' module.id %}" class="btn btn-sm btn-outline-primary" title="Edit">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12">
        <div class="alert alert-info" role="alert">
            <i class="fas fa-info-circle me-2"></i>No modules found. <a href="{% url 'lms:admin_add_module' %}">Create one</a>
        </div>
    </div>
    {% endfor %}
</div>

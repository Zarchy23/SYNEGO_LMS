{% extends "lms/base.html" %}

{% block title %}Add Department - Synego Institute{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0"><i class="fas fa-plus-circle me-2"></i>Add Department</h1>
        <a href="{% url 'lms:admin_departments' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Departments
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3">
                {% csrf_token %}
                <div class="col-md-8">
                    <label class="form-label">Department Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Department Code</label>
                    <input type="text" name="code" class="form-control" maxlength="20" required>
                </div>

                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" required></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Mission</label>
                    <textarea name="mission" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Vision</label>
                    <textarea name="vision" class="form-control" rows="3"></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Infrastructure</label>
                    <textarea name="infrastructure" class="form-control" rows="3" required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Resources</label>
                    <textarea name="resources" class="form-control" rows="3" required></textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Email</label>
                    <input type="email" name="contact_email" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Contact Phone</label>
                    <input type="text" name="contact_phone" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Office Location</label>
                    <input type="text" name="office_location" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Minimum Instructors</label>
                    <input type="number" name="min_instructors" class="form-control" min="1" value="1" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Maximum Capacity</label>
                    <input type="number" name="max_capacity" class="form-control" min="1" value="100" required>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2">
                    <a href="{% url 'lms:admin_departments' %}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Department</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

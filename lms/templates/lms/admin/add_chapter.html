{% extends "lms/base.html" %}
{% block title %}Add Chapter{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-lg-8"><div class="card"><div class="card-header bg-primary text-white">Add Chapter - {{ course.title }}</div><div class="card-body">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Title</label><input name="title" class="form-control" required></div>
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">Order</label><input type="number" name="order" class="form-control" required></div><div class="col-md-6 mb-3"><label class="form-label">Type</label><select name="chapter_type" class="form-select">{% for v,l in chapter_types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}</select></div></div>
<div class="mb-3"><label class="form-label">Video URL</label><input type="url" name="video_url" class="form-control"></div>
<div class="mb-3"><label class="form-label">Content</label><textarea name="content" class="form-control" rows="6" required></textarea></div>
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">Estimated Minutes</label><input type="number" name="estimated_minutes" class="form-control" value="30"></div><div class="col-md-6 mb-3"><label class="form-label">Template Doc ID</label><input name="template_doc_id" class="form-control"></div></div>
<div class="form-check mb-2"><input type="checkbox" name="is_free_preview" class="form-check-input" id="free"><label class="form-check-label" for="free">Free preview</label></div>
<div class="form-check mb-3"><input type="checkbox" name="requires_previous_quiz_pass" class="form-check-input" id="req" checked><label class="form-check-label" for="req">Requires previous completion</label></div>
<button class="btn btn-primary" type="submit">Save Chapter</button> <a class="btn btn-outline-secondary" href="{% url 'lms:manage_course' course.slug %}">Cancel</a>
</form></div></div></div></div></div>
{% endblock %}

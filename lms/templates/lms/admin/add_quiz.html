{% extends "lms/base.html" %}
{% block title %}Add Quiz{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-lg-8"><div class="card"><div class="card-header bg-primary text-white">Add Quiz - {{ course.title }}</div><div class="card-body">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Chapter</label><select name="chapter_id" class="form-select" required><option value="">Select chapter</option>{% for c in chapters %}<option value="{{ c.id }}" {% if selected_chapter and selected_chapter.id == c.id %}selected{% endif %}>{{ c.order }}. {{ c.title }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label">Title</label><input name="title" class="form-control" value="{% if selected_chapter %}Quiz for {{ selected_chapter.title }}{% endif %}"></div>
<div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
<div class="row"><div class="col-md-4 mb-3"><label class="form-label">Pass Score</label><input type="number" name="pass_score" class="form-control" value="70"></div><div class="col-md-4 mb-3"><label class="form-label">Time Limit Minutes</label><input type="number" name="time_limit_minutes" class="form-control"></div><div class="col-md-4 mb-3"><label class="form-label">Attempts</label><input type="number" name="attempts_allowed" class="form-control" value="1"></div></div>
<div class="form-check mb-2"><input type="checkbox" name="shuffle_questions" class="form-check-input" id="shuffle"><label class="form-check-label" for="shuffle">Shuffle questions</label></div>
<div class="form-check mb-3"><input type="checkbox" name="show_answers_after_submit" class="form-check-input" id="show" checked><label class="form-check-label" for="show">Show answers after submit</label></div>
<button class="btn btn-primary" type="submit">Save Quiz</button> <a class="btn btn-outline-secondary" href="{% url 'lms:manage_course' course.slug %}">Cancel</a>
</form></div></div></div></div></div>
{% endblock %}

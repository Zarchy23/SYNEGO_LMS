{% extends "lms/base.html" %}

{% block title %}Edit User - Synego Institute{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i>Edit User</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username *</label>
                                <input type="text" name="username" id="username" class="form-control" value="{{ edit_user.username }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email *</label>
                                <input type="email" name="email" id="email" class="form-control" value="{{ edit_user.email }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" name="first_name" id="first_name" class="form-control" value="{{ edit_user.first_name }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" name="last_name" id="last_name" class="form-control" value="{{ edit_user.last_name }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="phone_number" class="form-label">Phone Number</label>
                                <input type="tel" name="phone_number" id="phone_number" class="form-control" value="{{ edit_user.phone_number }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="role" class="form-label">Role *</label>
                                <select name="role" id="role" class="form-select" required>
                                    {% for role_value, role_label in role_choices %}
                                        <option value="{{ role_value }}" {% if edit_user.role == role_value %}selected{% endif %}>{{ role_label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="department_id" class="form-label">Department</label>
                            <select name="department_id" id="department_id" class="form-select">
                                <option value="">No Department</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}" {% if edit_user.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="is_approved" id="is_approved" class="form-check-input" {% if edit_user.is_approved %}checked{% endif %}>
                                    <label for="is_approved" class="form-check-label">Approved Account</label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="is_active" id="is_active" class="form-check-input" {% if edit_user.is_active %}checked{% endif %}>
                                    <label for="is_active" class="form-check-label">Active Account</label>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-light border">
                            <small class="text-muted">
                                <strong>Tip:</strong> Unchecking <em>Active Account</em> prevents user login. Unchecking <em>Approved Account</em> keeps account pending.
                            </small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'lms:admin_users' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

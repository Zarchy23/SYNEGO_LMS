{% extends "lms/base.html" %}
{% load static %}

{% block title %}Upload Document{% endblock %}

{% block content %}
<div class="container-fluid dashboard-layout" style="padding: 0; margin: 0;">
    <div class="dashboard-main" style="padding: 0; margin: 0; margin-left: 0; width: 100%;">
        <div style="padding: 40px; max-width: 700px; margin: 0 auto;">
            <h1 style="font-size: 28px; font-weight: 600; color: #333; margin-bottom: 30px;">📤 Upload Document</h1>

            <form method="POST" enctype="multipart/form-data" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                {% csrf_token %}

                <div style="margin-bottom: 20px;">
                    <label for="name" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Document Name *
                    </label>
                    <input type="text" id="name" name="name" required placeholder="e.g., Engineering Assignment, Grading Document" 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
                    <small style="color: #999; display: block; margin-top: 5px;">Give your document a clear, descriptive name</small>
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="description" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Description
                    </label>
                    <textarea id="description" name="description" rows="4" placeholder="Add details about this document..." 
                              style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; resize: vertical;"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label for="document_type" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                            Document Type *
                        </label>
                        <select id="document_type" name="document_type" required 
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #333;">
                            <option value="">-- Select Type --</option>
                            {% for val, label in doc_types %}
                                <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label for="course" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                            Related Course
                        </label>
                        <select id="course" name="course" 
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #333;">
                            <option value="">-- Select Course (Optional) --</option>
                            {% for course in courses %}
                                <option value="{{ course.id }}">{{ course.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="tags" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Tags
                    </label>
                    <input type="text" id="tags" name="tags" placeholder="e.g., engineering, surveying, lecture, exam" 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
                    <small style="color: #999; display: block; margin-top: 5px;">Comma-separated tags for easy searching</small>
                </div>

                <div style="margin-bottom: 20px; padding: 20px; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 4px; text-align: center;">
                    <input type="file" id="file" name="file" required 
                           style="display: none;" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.jpg,.png,.gif" onchange="updateFileName(this)">
                    <label for="file" style="cursor: pointer; display: block;">
                        <div style="font-size: 32px; margin-bottom: 10px;">📎</div>
                        <div style="font-weight: 600; color: #333; margin-bottom: 5px;">Click to upload or drag & drop</div>
                        <small style="color: #999;">PDF, Word, Excel, ZIP, Images (Max 100MB)</small>
                    </label>
                    <div id="fileName" style="margin-top: 10px; color: #667eea; font-weight: 600; display: none;"></div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #333;">
                        <input type="checkbox" name="is_public" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>Make public (anyone can view)</span>
                    </label>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" style="flex: 1; padding: 14px; background-color: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 16px; cursor: pointer;">
                        📤 Upload Document
                    </button>
                    <a href="{% url 'lms:document_storage_list' %}" style="flex: 1; padding: 14px; background-color: #999; color: white; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 16px; text-align: center;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function updateFileName(input) {
        if (input.files && input.files[0]) {
            document.getElementById('fileName').textContent = '✓ ' + input.files[0].name;
            document.getElementById('fileName').style.display = 'block';
        }
    }

    // Drag & drop support
    const fileInput = document.getElementById('file');
    const dropZone = document.querySelector('[style*="dashed"]');

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#f0f0f0';
        dropZone.style.borderColorColor = '#667eea';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.backgroundColor = '#f9f9f9';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        updateFileName(fileInput);
        dropZone.style.backgroundColor = '#f9f9f9';
    });
</script>
{% endblock %}

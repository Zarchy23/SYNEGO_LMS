{% extends "lms/base.html" %}
{% load static %}

{% block title %}Edit {{ document.name }}{% endblock %}

{% block content %}
<div class="container-fluid dashboard-layout" style="padding: 0; margin: 0;">
    <div class="dashboard-main" style="padding: 0; margin: 0; margin-left: 0; width: 100%;">
        <div style="padding: 40px; max-width: 700px; margin: 0 auto;">
            <h1 style="font-size: 28px; font-weight: 600; color: #333; margin-bottom: 30px;">✏️ Edit Document</h1>

            <form method="POST" style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                {% csrf_token %}

                <div style="margin-bottom: 20px;">
                    <label for="name" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Document Name *
                    </label>
                    <input type="text" id="name" name="name" required value="{{ document.name }}"
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="description" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Description
                    </label>
                    <textarea id="description" name="description" rows="4"
                              style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; resize: vertical;">{{ document.description }}</textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label for="document_type" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                            Document Type *
                        </label>
                        <select id="document_type" name="document_type" required
                                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; color: #333;">
                            {% for val, label in doc_types %}
                                <option value="{{ val }}" {% if document.document_type == val %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="tags" style="display: block; margin-bottom: 8px; font-weight: 500; color: #333;">
                        Tags
                    </label>
                    <input type="text" id="tags" name="tags" value="{{ document.tags }}"
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
                    <small style="color: #999; display: block; margin-top: 5px;">Comma-separated tags</small>
                </div>

                <div style="background: #f9f9f9; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
                    <h4 style="margin: 0 0 15px 0; color: #333;">Access Permissions</h4>
                    
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer;">
                        <input type="checkbox" name="is_public" {% if document.is_public %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                        <span style="color: #333;">Make public (anyone can see this document)</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer;">
                        <input type="checkbox" name="can_download" {% if document.can_download %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                        <span style="color: #333;">Allow downloading</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" name="can_view_online" {% if document.can_view_online %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                        <span style="color: #333;">Allow online viewing</span>
                    </label>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" style="flex: 1; padding: 14px; background-color: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 16px; cursor: pointer;">
                        ✓ Save Changes
                    </button>
                    <a href="{% url 'lms:document_detail' document.slug %}" style="flex: 1; padding: 14px; background-color: #999; color: white; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 16px; text-align: center;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
